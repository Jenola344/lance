name: Deploy Contracts (Testnet)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install stellar CLI
        run: |
          cargo install --locked stellar-cli --features opt

      - name: Build contracts
        run: |
          cargo build --release --target wasm32-unknown-unknown -p escrow
          cargo build --release --target wasm32-unknown-unknown -p reputation
          cargo build --release --target wasm32-unknown-unknown -p job_registry

      - name: Deploy to Testnet
        env:
          STELLAR_SECRET_KEY: ${{ secrets.STELLAR_SECRET_KEY }}
        run: |
          stellar contract deploy \
            --wasm target/wasm32-unknown-unknown/release/escrow.wasm \
            --source-account "$STELLAR_SECRET_KEY" \
            --network testnet
          # TODO: repeat for reputation + job_registry, capture contract IDs
